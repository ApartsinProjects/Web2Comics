services:
  - type: web
    name: web2comics-telegram-render-bot
    runtime: node
    plan: free
    buildCommand: npm install && npx playwright install chromium
    startCommand: node telegram/src/webhook-bot.js
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
      - key: COMICBOT_ALLOWED_CHAT_IDS
        value: all
      - key: RENDER_BOT_BASE_CONFIG
        value: telegram/config/default.render.yml
