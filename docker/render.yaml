services:
  - type: web
    name: web2comics-telegram-render-bot
    env: docker
    plan: free
    region: oregon
    autoDeploy: true
    dockerContext: .
    dockerfilePath: ./docker/Dockerfile
    dockerCommand: node telegram/src/webhook-bot.js
    healthCheckPath: /healthz
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
      - key: TELEGRAM_ADMIN_CHAT_IDS
        sync: false
      - key: COMICBOT_ALLOWED_CHAT_IDS
        value: all
      - key: RENDER_BOT_PERSISTENCE_MODE
        value: r2
      - key: RENDER_BOT_BASE_CONFIG
        value: telegram/config/default.render.yml
      - key: RENDER_BOT_STATE_FILE
        value: telegram/data/runtime-state.json
      - key: RENDER_BOT_OUT_DIR
        value: telegram/out
      - key: RENDER_BOT_FETCH_TIMEOUT_MS
        value: "45000"
      - key: RENDER_BOT_DEFAULT_PROVIDER
        value: gemini
      - key: RENDER_BOT_DEFAULT_OBJECTIVE
        value: explain-like-im-five
      - key: CLOUDFLARE_ACCOUNT_ID
        sync: false
      - key: CLOUDFLARE_WORKERS_AI_TOKEN
        sync: false
      - key: CLOUDFLARE_ACCOUNT_API_TOKEN
        sync: false
      - key: R2_S3_ENDPOINT
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: HUGGINGFACE_INFERENCE_API_TOKEN
        sync: false
