<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comic Viewer - Web to Comic</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div class="viewer-container">
    <header class="viewer-header">
      <h1>Comic Viewer</h1>
      <div class="header-actions">
        <button id="new-comic-btn" class="btn small secondary">New Comic</button>
        <button id="download-btn" class="btn small primary" disabled>Download</button>
      </div>
    </header>

    <main class="viewer-main">
      <div id="empty-state" class="empty-state">
        <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
          <rect x="8" y="8" width="48" height="48" rx="4" stroke="currentColor" stroke-width="2" fill="none"/>
          <path d="M20 32h24M32 20v24" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <h2>No Comic Generated</h2>
        <p>Generate a comic from any web page using the extension popup.</p>
        <button id="open-popup-btn" class="btn secondary">Open Extension</button>
      </div>

      <div id="comic-display" class="comic-display hidden">
        <div class="comic-meta">
          <h2 id="comic-title">Comic Title</h2>
          <a id="comic-source" href="#" target="_blank" class="source-link">View Original</a>
        </div>

        <div class="view-mode-toggle">
          <button class="toggle-btn active" data-mode="strip">Strip View</button>
          <button class="toggle-btn" data-mode="panels">Panel View</button>
        </div>

        <div id="comic-strip" class="comic-strip">
          <!-- Panels will be rendered here -->
        </div>

        <div id="comic-panels" class="comic-panels hidden">
          <!-- Individual panel view -->
        </div>
      </div>

      <div id="generation-view" class="generation-view hidden">
        <div class="generation-status">
          <div class="spinner"></div>
          <h3 id="gen-status-title">Generating Comic...</h3>
          <p id="gen-status-text">Preparing your comic strip</p>
        </div>

        <div id="gen-panels" class="gen-panels">
          <!-- Progressive panel rendering -->
        </div>

        <div class="generation-actions">
          <button id="cancel-gen-btn" class="btn danger">Cancel</button>
        </div>
      </div>
    </main>

    <aside id="sidebar" class="sidebar">
      <div class="sidebar-section">
        <h3>Settings</h3>
        <div class="sidebar-item">
          <label>Panels</label>
          <select id="sidebar-panels" class="select">
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6" selected>6</option>
            <option value="8">8</option>
            <option value="10">10</option>
            <option value="12">12</option>
          </select>
        </div>
        <div class="sidebar-item">
          <label>Style</label>
          <select id="sidebar-style" class="select">
            <option value="default">Default</option>
            <option value="noir">Noir</option>
            <option value="minimalist">Minimalist</option>
            <option value="manga">Manga</option>
            <option value="superhero">Superhero</option>
            <option value="watercolor">Watercolor</option>
          </select>
        </div>
        <div class="sidebar-item">
          <label>Provider</label>
          <select id="sidebar-provider" class="select">
            <option value="gemini-free">Gemini Free</option>
            <option value="cloudflare-free">Cloudflare AI</option>
          </select>
        </div>
      </div>

      <div class="sidebar-section">
        <h3>Actions</h3>
        <button id="regenerate-btn" class="btn small secondary full-width" disabled>Regenerate</button>
        <button id="edit-storyboard-btn" class="btn small secondary full-width" disabled>Edit Storyboard</button>
      </div>

      <div class="sidebar-section">
        <h3>History</h3>
        <div id="history-list" class="history-list">
          <!-- History items -->
        </div>
      </div>
    </aside>
  </div>

  <script src="sidepanel.js" type="module"></script>
</body>
</html>
