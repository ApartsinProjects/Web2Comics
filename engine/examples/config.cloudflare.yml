input:
  format: auto
  max_chars: 12000

generation:
  panel_count: 3
  objective: summarize
  output_language: en
  detail_level: low
  style_prompt: "clean comic visual style"

providers:
  text:
    provider: cloudflare
    model: '@cf/meta/llama-3.1-8b-instruct'
    account_id_env: CLOUDFLARE_ACCOUNT_ID
    api_token_env: CLOUDFLARE_API_TOKEN
  image:
    provider: cloudflare
    model: '@cf/black-forest-labs/flux-1-schnell'
    account_id_env: CLOUDFLARE_ACCOUNT_ID
    api_token_env: CLOUDFLARE_API_TOKEN

runtime:
  timeout_ms: 120000
  image_concurrency: 2
  retries: 1

output:
  width: 1200
  panel_height: 620
  caption_height: 120
  header_height: 110
  footer_height: 30
  padding: 20
  gap: 14
  background: "#f8fafc"
  brand: "Made with Web2Comics Engine"
