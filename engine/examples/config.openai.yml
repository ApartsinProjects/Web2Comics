input:
  format: auto
  max_chars: 14000

generation:
  panel_count: 3
  objective: summarize
  output_language: en
  detail_level: low
  style_prompt: "cinematic comic style, expressive characters"

providers:
  text:
    provider: openai
    model: gpt-4o-mini
    api_key_env: OPENAI_API_KEY
  image:
    provider: openai
    model: dall-e-2
    api_key_env: OPENAI_API_KEY
    size: 1024x1024
    quality: standard

runtime:
  timeout_ms: 120000
  image_concurrency: 2
  retries: 1

output:
  width: 1400
  panel_height: 700
  caption_height: 120
  header_height: 120
  footer_height: 34
  padding: 24
  gap: 16
  background: "#f8fafc"
  brand: "Made with Web2Comics Engine"
