services:
  - type: web
    name: web2comics-telegram-render-bot
    runtime: node
    plan: free
    buildCommand: npm install && npx playwright install chromium
    startCommand: node telegram/src/webhook-bot.js
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
      - key: RENDER_PUBLIC_BASE_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: RENDER_BOT_PG_URL
        sync: false
      - key: RENDER_BOT_PG_TABLE
        value: render_bot_state
      - key: RENDER_BOT_PG_STATE_KEY
        value: runtime_config
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: CLOUDFLARE_ACCOUNT_ID
        sync: false
      - key: CLOUDFLARE_API_TOKEN
        sync: false
      - key: HUGGINGFACE_INFERENCE_API_TOKEN
        sync: false
      - key: COMICBOT_ALLOWED_CHAT_IDS
        sync: false
      - key: RENDER_BOT_BASE_CONFIG
        value: telegram/config/default.render.yml
      - key: RENDER_BOT_STATE_FILE
        value: telegram/data/runtime-state.json
      - key: RENDER_BOT_OUT_DIR
        value: telegram/out
      - key: RENDER_BOT_FETCH_TIMEOUT_MS
        value: "45000"
      - key: RENDER_BOT_DEBUG_ARTIFACTS
        value: "false"
